notes:
  - "Раздел «Sales Activities and Fair Competition» содержит исчерпывающий перечень запрещённых тем для обсуждения с конкурентами: цены, торги, рынки, территории."
  - "Ранее ошибочно присвоен P06 фрагменту, который описывает запрет на соглашения с конкурентами, а не протоколы встреч."
