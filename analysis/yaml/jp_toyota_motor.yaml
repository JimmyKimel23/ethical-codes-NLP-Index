key_excerpts:
  - original: "Do not discuss or make agreements with competitors about pricing, costs, bids, markets, territories, customers, suppliers or contract terms and conditions."
    translated_ru: "Запрещается обсуждать или заключать соглашения с конкурентами о ценообразовании, затратах, торгах, рынках, территориях, клиентах, поставщиках или условиях контрактов."
    section_title: "Sales Activities and Fair Competition"
    relevance_comment: "Прямой запрет на ценовой сговор, раздел рынков, манипуляции с торгами и обмен конфиденциальной информацией с конкурентами."
    supports_principles:
      - "P02_no_price_fixing"
      - "P03_no_market_allocation"
      - "P04_no_bid_rigging"
      - "P05_no_sensitive_info_exchange"
  - original: "Toyota develops products and services that meet the needs of our customers, and provides them through fair competition and responsible marketing. Market our products in a manner that is truthful and not misleading."
    translated_ru: "Toyota разрабатывает продукты и услуги, отвечающие потребностям клиентов, и предоставляет их на основе честной конкуренции и ответственного маркетинга. Маркетинг продукции осуществляется правдиво и без введения в заблуждение."
    section_title: "Sales Activities and Fair Competition"
    relevance_comment: "Политика честной конкуренции и ответственного маркетинга."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
