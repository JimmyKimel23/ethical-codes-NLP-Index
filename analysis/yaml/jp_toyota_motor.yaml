analyst_summary_ru: "Кодекс поведения Toyota Motor содержит прямой и детальный запрет на обсуждение и заключение соглашений с конкурентами по вопросам ценообразования, затрат, торгов, рынков, территорий, клиентов и поставщиков. Это покрывает принципы запрета ценового сговора, раздела рынков и манипулирования торгами. Компания декларирует приверженность честной конкуренции и ответственному маркетингу."
