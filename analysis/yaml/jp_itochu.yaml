analyst_summary_ru: "Кодекс этического поведения ITOCHU в разделе 5 устанавливает обязательство соблюдать антимонопольное законодательство и связанные нормативные акты во всех странах присутствия. Формулировка носит общий характер без детализации конкретных запретов. Раздел 9 предусматривает механизм сообщения о нарушениях Кодекса, включая обязанность немедленного информирования руководства и использование Программы комплаенса группы ITOCHU."
