key_excerpts:
  - original: "We will conduct business practices in compliance with competition laws (antitrust laws) and related laws and regulations in each country and region."
    translated_ru: "Мы будем осуществлять деловую деятельность в соответствии с законами о конкуренции (антимонопольным законодательством) и связанными с ними законами и нормативными актами в каждой стране и регионе."
    section_title: "5. Fair Business Practices — Compliance with Competition Law (Antitrust Law)"
    relevance_comment: "Прямое обязательство соблюдать антимонопольное законодательство во всех юрисдикциях."
    supports_principles:
      - "P01_follow_competition_laws"
  - original: "If employees discover or personally engage in conduct that violates or may violate the Code, they will immediately report to their superior. In addition, if this conduct constitutes or is likely to constitute a compliance case, it will be promptly reported in accordance with the ITOCHU Group Compliance Program."
    translated_ru: "Если сотрудники обнаруживают или лично участвуют в поведении, которое нарушает или может нарушить Кодекс, они обязаны немедленно сообщить об этом своему руководителю. Кроме того, если такое поведение представляет собой или может представлять собой случай несоблюдения комплаенса, о нём необходимо незамедлительно сообщить в соответствии с Программой комплаенса группы ITOCHU."
    section_title: "9. Reporting and Consultation"
    relevance_comment: "Механизм эскалации и сообщения о нарушениях, применимый в том числе к нарушениям антимонопольного законодательства."
    supports_principles:
      - "P11_report_violations"
