key_excerpts:
  - original: "We operate within antitrust and unfair competition laws in Japan and overseas and always compete fairly in the market."
    translated_ru: "Мы действуем в рамках антимонопольного законодательства и законов о недобросовестной конкуренции в Японии и за рубежом и всегда конкурируем честно на рынке."
    section_title: "6. Fair, open and free competition and trade"
    relevance_comment: "Прямое обязательство соблюдения антимонопольных законов и честной конкуренции."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "The DOCOMO Group recognizes that it attracts significant public attention, and we comply with the rules of free competition in trade without fear or favor. We ensure that transactions are conducted openly and fairly with due respect for our business partners."
    translated_ru: "Группа DOCOMO осознаёт повышенное общественное внимание к своей деятельности и соблюдает правила свободной конкуренции в торговле без предвзятости. Мы обеспечиваем открытое и честное проведение сделок с надлежащим уважением к деловым партнёрам."
    section_title: "6. Fair, open and free competition and trade"
    relevance_comment: "Обязательство открытых и честных сделок в условиях свободной конкуренции."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
  - original: "In the event of any violation of law, regulation or ethics, our management identifies the cause, takes steps to resolve the issue to prevent reoccurrence and deals strictly with those involved, including members of the management team."
    translated_ru: "В случае любого нарушения закона, нормативного акта или этических норм руководство выявляет причину, принимает меры по устранению проблемы и предотвращению повторения, а также строго реагирует в отношении виновных, включая членов руководства."
    section_title: "10. In-house ethical system and commitment"
    relevance_comment: "Механизм реагирования на нарушения, включая нарушения антимонопольного законодательства."
    supports_principles:
      - "P11_report_violations"
