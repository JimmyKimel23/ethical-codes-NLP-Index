analyst_summary_ru: "Этический кодекс NTT DOCOMO Group включает раздел «Честная, открытая и свободная конкуренция и торговля», в котором группа обязуется соблюдать антимонопольное законодательство и законы о недобросовестной конкуренции в Японии и за рубежом, а также всегда конкурировать честно. Документ подчёркивает открытость и справедливость сделок. Предусмотрен механизм реагирования на нарушения, включая выявление причин и строгие меры в отношении виновных. Конкретные запреты на сговор или обмен информацией с конкурентами в тексте не детализированы."
