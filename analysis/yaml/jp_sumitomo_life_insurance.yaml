analyst_summary_ru: >-
  Полный текст Кодекса поведения Sumitomo Life Insurance был проверен вручную на наличие положений
  о конкуренции. Единственное совпадение — термин «collusion» в разделе 5 «Prevention of internal
  collusion due to conflict of interest», однако речь идёт о предотвращении конфликта интересов
  между группой Sumitomo Life и её клиентами, а не о сговоре с конкурентами или антимонопольном
  законодательстве. Поиск по ключевым словам competition, antitrust, cartel, price fixing, bid rigging,
  monopoly, anti-competitive, competitor, unfair trade, dominant position не дал результатов. Документ
  сосредоточен на клиентоориентированном подходе, управлении рисками, защите персональных данных
  и противодействии антисоциальным элементам.
