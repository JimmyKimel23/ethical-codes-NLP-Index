key_excerpts:
  - original: "2. Fair Bidding Practices. When bidding on public or private construction projects, we refrain from any action that could inhibit a fair bidding process, including violations of criminal law, antitrust law, and other laws or regulations."
    translated_ru: "При участии в публичных и частных тендерах компания требует воздерживаться от любых действий, которые могут нарушить честность торгов, включая нарушения антимонопольного и иного применимого законодательства."
    section_title: "2. Fair Bidding Practices"
    relevance_comment: "Операциональное правило для поведения в тендерах."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P04_no_bid_rigging"
  - original: "6. Promoting Fair Competition. We engage in fair and free competition and enhance corporate competitiveness by improving productivity, developing advanced technical skills, and reducing operating costs."
    translated_ru: "Отдельный раздел закрепляет курс на свободную и добросовестную конкуренцию и повышение конкурентоспособности за счет эффективности, технологий и снижения издержек, а не за счет недобросовестных практик."
    section_title: "6. Promoting Fair Competition"
    relevance_comment: "Подтверждает общий принцип добросовестной конкуренции."
    supports_principles:
