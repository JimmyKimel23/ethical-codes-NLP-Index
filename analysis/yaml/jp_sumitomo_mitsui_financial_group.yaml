analyst_summary_ru: "Кодекс поведения SMBC Americas Division содержит раздел «Antitrust and Anti-Tying», который запрещает соглашения и коммуникации, наносящие ущерб конкуренции, а также практику привязки банковских продуктов. Сотрудники обязаны знать и соблюдать применимые антимонопольные правила. В случае неясности или риска нарушения предписано обращаться в юридический отдел. Детализированные процедуры контактов с конкурентами в документе не прописаны."
