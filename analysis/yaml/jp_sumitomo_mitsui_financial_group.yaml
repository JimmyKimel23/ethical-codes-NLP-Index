key_excerpts:
  - original: "Antitrust law is designed to promote a competitive marketplace by restricting certain agreements, communications and behavior that harm competition. Violation of the antitrust laws can include certain agreements or communications with competitors, and unilateral conduct by firms with substantial market power, including bundling practices and product tying."
    translated_ru: "Антимонопольное законодательство направлено на содействие конкурентному рынку путём ограничения определённых соглашений, коммуникаций и действий, наносящих ущерб конкуренции. Нарушение антимонопольного законодательства может включать определённые соглашения или коммуникации с конкурентами, а также одностороннее поведение компаний, обладающих значительной рыночной властью, включая практику навязывания пакетных предложений и привязки продуктов."
    section_title: "Antitrust and Anti-Tying"
    relevance_comment: "Ключевой раздел, определяющий антимонопольные требования и запрет на привязку продуктов."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P02_no_price_fixing"
  - original: "It is your responsibility to know and comply with the antitrust and anti-tying rules applicable to the location where you work. If you are unsure of what rules apply to you or if your conduct is at risk of violating such rules, consult with your Legal Department."
    translated_ru: "Вы обязаны знать и соблюдать антимонопольные правила и правила о запрете привязки продуктов, действующие в вашем регионе. Если вы не уверены, какие правила к вам применимы, или существует риск нарушения, обратитесь в юридический отдел."
    section_title: "Antitrust and Anti-Tying"
    relevance_comment: "Требование эскалации вопросов антимонопольного права в юридический отдел."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P10_escalate_to_legal"
