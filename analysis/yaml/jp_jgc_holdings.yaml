key_excerpts:
  - original: "5. Fair Competition and International Trade ... you must avoid putting yourself in a situation where you could be suspected of violating competition laws. Be cautious when meeting with competitors. Prior to such meetings, check the purpose, agenda and the attendees of the meeting, and never attend if the topic to be discussed is likely to violate laws and regulations."
