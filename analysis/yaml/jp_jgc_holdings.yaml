analyst_summary_ru: "В кодексе JGC Holdings присутствует отдельный раздел 5 о честной конкуренции и международной торговле. Помимо общей нормы о соблюдении competition laws, он задает конкретный порядок встреч с конкурентами (проверка agenda/attendees, отказ от рискованных обсуждений). По этим основаниям статус изменен на explicit_section, evidence_quality — high."
