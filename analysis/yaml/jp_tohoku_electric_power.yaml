analyst_summary_ru: "Кодекс поведения Tohoku Electric Power Group содержит явные обязательства по соблюдению антимонопольного законодательства и норм Закона об электроэнергетике, а также по ведению бизнеса на основе добросовестной и свободной конкуренции. Документ запрещает рекламу, порочащую других участников рынка, что соответствует принципу неприменения дискредитации конкурентов. Также предусмотрена ответственность руководства за расследование серьёзных нарушений и принятие мер по предотвращению их повторения."
