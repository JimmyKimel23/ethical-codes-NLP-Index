key_excerpts:
  - original: "We will ensure the compliance with the regulations of conduct defined in the Electricity Business Act, as well as striving to ensure fair competition among businesses."
    translated_ru: "Мы обеспечим соблюдение норм поведения, установленных Законом об электроэнергетике, а также будем стремиться к обеспечению добросовестной конкуренции между участниками рынка."
    section_title: "Ensuring compliance with corporate ethics and laws and regulations"
    relevance_comment: "Прямое обязательство обеспечивать добросовестную конкуренцию в соответствии с отраслевым законодательством."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "We will ensure to comply with transaction-related laws and regulations including the Antitrust Law, and conduct the business on the basis of fair and free competition."
    translated_ru: "Мы обеспечим соблюдение законов и нормативных актов, связанных с торговыми операциями, включая Антимонопольный закон, и будем вести бизнес на основе добросовестной и свободной конкуренции."
    section_title: "Ensuring compliance with corporate ethics and laws and regulations"
    relevance_comment: "Явное указание на соблюдение антимонопольного законодательства и принцип свободной конкуренции."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "When conducting public relations and public hearing activities, we will be factual and sincere. In addition, we will not advertise in a manner that is defamatory of others or injurious to personal dignity."
    translated_ru: "При осуществлении деятельности в области связей с общественностью мы будем объективны и искренни. Кроме того, мы не будем размещать рекламу, порочащую других лиц или наносящую ущерб их достоинству."
    section_title: "Promoting transparent business activities"
    relevance_comment: "Запрет на дискредитацию других участников рынка в рекламе — элемент добросовестной конкуренции."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
  - original: "In the event of a serious violation of this guideline, top management will declare its intention to solve the problem itself internally and externally, investigate the cause, and take measures to prevent recurrence."
    translated_ru: "В случае серьёзного нарушения настоящего руководства высшее руководство заявит о намерении решить проблему как внутри компании, так и за её пределами, расследует причины и примет меры по предотвращению повторения."
    section_title: "Response from top management and managers"
    relevance_comment: "Ответственность руководства за расследование нарушений и предотвращение их повторения."
    supports_principles:
      - "P11_report_violations"
      - "P12_internal_controls_and_documentation"
