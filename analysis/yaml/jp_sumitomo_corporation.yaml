key_excerpts:
  - original: "Anti-monopoly, Antitrust and Prohibition of Anti-competitive Agreements. We must never create or take part in any improper monopolies. We must also never enter into bid-rigging agreements or other anti-competitive or collusive agreements with our competitors. We may not engage in discussions with our competitors for the purpose of fixing prices or sales volume, or allocating customers or sales territories."
    translated_ru: "Компания прямо запрещает участие в монополистических практиках, сговорах и соглашениях о манипулировании торгами. Отдельно запрещены обсуждения с конкурентами для фиксации цен/объемов продаж и раздела клиентов или территорий."
    section_title: "Anti-monopoly, Antitrust and Prohibition of Anti-competitive Agreements"
    relevance_comment: "Фрагмент охватывает сразу несколько операциональных запретов: bid-rigging, collusive agreements и координацию рыночного поведения."
