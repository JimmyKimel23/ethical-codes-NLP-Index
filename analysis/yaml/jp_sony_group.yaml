key_excerpts:
  - original: "Sony competes vigorously, fairly, and complies with all applicable antitrust and competition laws. Antitrust and competition laws support market competition, which allows companies providing superior products, services and entertainment under better terms to be successful."
    translated_ru: "Sony конкурирует энергично, честно и соблюдает все применимые антимонопольные законы и законы о конкуренции. Антимонопольное законодательство поддерживает рыночную конкуренцию, которая позволяет компаниям, предлагающим лучшие продукты, услуги и развлечения на более выгодных условиях, добиваться успеха."
    section_title: "4-4 Compete Fairly"
    relevance_comment: "Ключевое обязательство соблюдения антимонопольного законодательства и честной конкуренции."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "Competition laws prohibit agreements or practices that impede or destroy fair competition. We must obtain advice from our legal department prior to exchanging information with competitors. We must know and comply with applicable competition laws wherever we do business."
    translated_ru: "Законы о конкуренции запрещают соглашения или практики, препятствующие или разрушающие честную конкуренцию. Мы обязаны получить консультацию юридического отдела до обмена информацией с конкурентами. Мы должны знать и соблюдать применимое законодательство о конкуренции во всех регионах нашей деятельности."
    section_title: "4-4 Compete Fairly"
    relevance_comment: "Запрет антиконкурентных соглашений и требование консультации с юридическим отделом перед обменом информацией с конкурентами."
    supports_principles:
      - "P02_no_price_fixing"
      - "P05_no_sensitive_info_exchange"
      - "P10_escalate_to_legal"
  - original: "Speaking up is important for us to build an ethical work environment. If we think that someone has engaged in misconduct, we have a duty to promptly report our concerns. We participate in an investigation when asked."
    translated_ru: "Открытость важна для создания этичной рабочей среды. Если мы считаем, что кто-то совершил нарушение, мы обязаны незамедлительно сообщить о своих опасениях. Мы участвуем в расследованиях по запросу."
    section_title: "1-3 Speak Up"
    relevance_comment: "Обязанность сотрудников сообщать о нарушениях, включая антимонопольные, через установленные каналы."
    supports_principles:
      - "P11_report_violations"
