analyst_summary_ru: "Кодекс поведения Sony Group содержит развёрнутый раздел «Compete Fairly» (Конкурируй честно), в котором компания обязуется соблюдать все применимые антимонопольные законы и законы о конкуренции. Прямо указано, что законы о конкуренции запрещают соглашения или практики, препятствующие честной конкуренции, и что сотрудники обязаны получить консультацию юридического отдела до обмена информацией с конкурентами. Раздел «Speak Up» обязывает сотрудников незамедлительно сообщать о любых нарушениях. Документ также ссылается на внутреннюю глобальную политику Sony по соблюдению антимонопольного законодательства."
