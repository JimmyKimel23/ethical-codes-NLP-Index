analyst_summary_ru: "Кодекс поведения Takenaka Corporation содержит несколько положений о конкуренции в разделе «Compliance with laws and social norms». Документ требует участия в справедливой и прозрачной рыночной конкуренции на основе проектных и технологических возможностей компании. Прямо предписывается соблюдение антимонопольного законодательства, недопущение ненадлежащего поведения при торгах и злоупотребления доминирующим положением в сделках."
