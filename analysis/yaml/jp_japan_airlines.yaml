key_excerpts:
  - original: "The JAL Group conducts fair and transparent transactions with all business partners in compliance with applicable laws and regulations such as antitrust laws based on the principle of free competition. In countries and regions around the world, we understand the purpose and content of competition laws of each country and comply with such laws."
    translated_ru: "Группа JAL проводит честные и прозрачные операции со всеми деловыми партнёрами в соответствии с применимым законодательством, включая антимонопольные законы, на основе принципа свободной конкуренции. В странах и регионах по всему миру мы понимаем цели и содержание законов о конкуренции каждой страны и соблюдаем их."
    section_title: "7. Fair business practices — (4) Free and fair competition"
    relevance_comment: "Прямое обязательство соблюдать антимонопольное законодательство и принцип свободной конкуренции."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "We understand the laws and procedures applicable to our respective business field, and act upon the advice of whistleblowers, legal departments, and others in the event of a non-compliance or potential non-compliance."
    translated_ru: "Мы понимаем применимые к нашей деятельности законы и процедуры и принимаем меры по рекомендациям информаторов, юридических подразделений и других лиц в случае нарушения или потенциального нарушения."
    section_title: "7. Fair business practices — (1) Reinforcing compliance"
    relevance_comment: "Механизм реагирования на нарушения комплаенса, включая обращение к юристам и использование информирования."
    supports_principles:
      - "P10_escalate_to_legal"
      - "P11_report_violations"
