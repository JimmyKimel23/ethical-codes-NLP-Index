analyst_summary_ru: "Кодекс поведения JAL Group в подразделе (4) раздела 7 устанавливает обязательство проводить честные и прозрачные операции на основе принципа свободной конкуренции и в соответствии с антимонопольным законодательством всех стран присутствия. Подраздел (1) предусматривает механизм реагирования на нарушения комплаенса, включая обращение к юридическим подразделениям и использование каналов информирования. Конкретные запреты на ценовой сговор, раздел рынка или обмен конфиденциальной информацией не детализированы."
