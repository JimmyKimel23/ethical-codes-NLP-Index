key_excerpts:
  - original: "We will promote fair, transparent and free competition as well as appropriate transactions in strict compliance with laws and regulations."
    translated_ru: "Мы будем содействовать честной, прозрачной и свободной конкуренции, а также надлежащему проведению сделок в строгом соответствии с законами и нормативными актами."
    section_title: "(2) Fair competition and appropriate transactions"
    relevance_comment: "Прямое обязательство честной и свободной конкуренции в соответствии с законодательством."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "We will ensure strict compliance with the Code of Conduct through internal audits by the Audit Division and other means, and establish a whistle blower system to allow any officer, employee, as well as outsider, to report to the Company should any doubts about compliance with the Code of Conduct or any violations thereof, arise."
    translated_ru: "Мы обеспечим строгое соблюдение Кодекса поведения посредством внутренних проверок Отдела аудита и иных средств, а также создадим систему информирования о нарушениях, позволяющую любому должностному лицу, сотруднику или стороннему лицу сообщить компании о любых сомнениях в соблюдении Кодекса поведения или о выявленных нарушениях."
    section_title: "Compliance framework"
    relevance_comment: "Наличие системы информирования о нарушениях и внутреннего аудита для обеспечения соблюдения кодекса, включая правила конкуренции."
    supports_principles:
      - "P11_report_violations"
      - "P12_internal_controls_and_documentation"
  - original: "In the unlikely event that a violation of this Code of Conduct should occur, we will immediately investigate the backgrounds for prompt resolution of the problem, take strict disciplinary actions in accordance with laws, regulations, and internal rules, and work tirelessly to prevent recurrence."
    translated_ru: "В случае нарушения настоящего Кодекса поведения мы незамедлительно расследуем обстоятельства для скорейшего устранения проблемы, примем строгие дисциплинарные меры в соответствии с законами, нормативными актами и внутренними правилами и будем неустанно работать над предотвращением повторных нарушений."
    section_title: "Compliance framework"
    relevance_comment: "Механизм расследования нарушений и дисциплинарных мер."
    supports_principles:
      - "P11_report_violations"
