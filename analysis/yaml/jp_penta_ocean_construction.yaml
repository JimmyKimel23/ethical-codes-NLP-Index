notes:
  - "Документ содержит общее обязательство честной конкуренции, но без детализации конкретных антимонопольных запретов."
limitations:
  - "Отсутствуют конкретные упоминания ценового сговора, раздела рынков, сговора на торгах или обмена информацией с конкурентами, несмотря на принадлежность компании к строительной отрасли."
analyst_summary_ru: "Кодекс поведения Penta-Ocean Construction содержит обязательство содействовать честной, прозрачной и свободной конкуренции в строгом соответствии с законодательством. Компания предусматривает систему внутренних проверок и канал для информирования о нарушениях, доступный как сотрудникам, так и внешним лицам. В случае нарушений предусмотрено незамедлительное расследование и строгие дисциплинарные меры. При этом документ не содержит конкретных запретов на сговор на торгах, ценовой сговор или обмен конкурентной информацией."
