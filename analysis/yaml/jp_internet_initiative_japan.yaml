key_excerpts:
  - original: "It is the policy of IIJ Group to comply with applicable antitrust, competition and fair trade laws and regulations of each country and region where IIJ Group conducts its businesses."
    translated_ru: "Политика IIJ Group заключается в соблюдении применимого антимонопольного законодательства, законов о конкуренции и добросовестной торговле в каждой стране и регионе, где группа ведёт свою деятельность."
    section_title: "Fair Dealing"
    relevance_comment: "Прямое обязательство по соблюдению антимонопольного и конкурентного законодательства во всех юрисдикциях."
    supports_principles:
      - "P01_follow_competition_laws"
  - original: "Directors, officers and employees are required to deal fairly with IIJ Group's financial institutions, customers, suppliers, vendors, competitors, agents and other entities, to base their business relationships on lawful, efficient and fair practices and to use only ethical practices when dealing with actual or potential counterparties."
    translated_ru: "Директора, должностные лица и сотрудники обязаны добросовестно взаимодействовать с финансовыми учреждениями, клиентами, поставщиками, конкурентами, агентами и другими контрагентами группы IIJ, строить деловые отношения на основе законных, эффективных и справедливых практик и использовать только этичные методы при работе с фактическими или потенциальными контрагентами."
    section_title: "Fair Dealing"
    relevance_comment: "Требование добросовестного и этичного поведения при взаимодействии с конкурентами и другими контрагентами."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
  - original: "It is prohibited to give and accept anything of value from any current or potential counterparties, including financial institutions, suppliers or vendors as inducement for or in return for business or preferential treatment and to take advantage of any financial institution, customer, supplier, competitor or other entity through manipulation, concealment, abuse of privileged information, misrepresentation of material facts, or any other unfair business practices."
    translated_ru: "Запрещается давать или принимать что-либо ценное от нынешних или потенциальных контрагентов в качестве побуждения или вознаграждения за деловое или преференциальное обращение, а также извлекать выгоду из взаимоотношений с конкурентами или другими контрагентами путём манипуляции, сокрытия информации, злоупотребления привилегированной информацией, искажения существенных фактов или иных недобросовестных деловых практик."
    section_title: "Fair Dealing"
    relevance_comment: "Запрет на недобросовестные практики, включая злоупотребление информацией в отношении конкурентов."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
      - "P07_no_improper_competitor_intel"
  - original: "IIJ Group will protect its own confidential and proprietary information as well as the information that financial institutions, customers, suppliers, competitors or their employees entrust to IIJ Group."
    translated_ru: "IIJ Group будет защищать собственную конфиденциальную и проприетарную информацию, а также информацию, которую финансовые учреждения, клиенты, поставщики, конкуренты или их сотрудники доверяют группе IIJ."
    section_title: "Confidential Information"
    relevance_comment: "Явное обязательство защищать конфиденциальную информацию конкурентов, доверенную группе."
    supports_principles:
      - "P08_respect_competitor_confidential_info"
  - original: "Each of Officers and Employees of IIJ Group is expected to notify the CEO promptly of any past, existing or potential violation of this Code in the departments which he or she is in charge of."
    translated_ru: "Каждый директор и сотрудник группы IIJ обязан незамедлительно уведомить генерального директора о любом прошлом, текущем или потенциальном нарушении настоящего Кодекса в подразделениях, за которые он отвечает."
    section_title: "Reporting of Violation of this Code"
    relevance_comment: "Обязанность сообщать о нарушениях кодекса, включая нарушения антимонопольного законодательства."
    supports_principles:
      - "P11_report_violations"
