notes:
  - "Раздел VII (Конфликт интересов) упоминает конкурентов, но в контексте COI, а не контроля контактов с конкурентами — P06 не применим."
limitations:
  - "Нет специализированных положений о ценовом сговоре, разделе рынков или протоколах контактов с конкурентами."
analyst_summary_ru: "Кодекс поведения Internet Initiative Japan содержит комплексный раздел о добросовестной деловой практике, включающий обязательство по соблюдению антимонопольного и конкурентного законодательства во всех юрисдикциях. Запрещены недобросовестные практики, в том числе злоупотребление привилегированной информацией и манипуляции в отношении конкурентов. Отдельно закреплено обязательство защищать конфиденциальную информацию, доверенную компании конкурентами. Предусмотрена обязанность сотрудников сообщать о нарушениях кодекса."
