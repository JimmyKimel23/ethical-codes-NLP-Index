key_excerpts:
  - original: "The Yamato Group seeks to be profitable through fair and honest competition while respecting human rights and upholding the letter and spirit of laws and international regulations."
    translated_ru: "Группа Yamato стремится к прибыльности через честную и добросовестную конкуренцию при соблюдении прав человека и духа и буквы законов и международных нормативных актов."
    section_title: "Corporate stance (preamble)"
    relevance_comment: "Декларация приверженности честной конкуренции на уровне корпоративной позиции."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "We will comply with the Antimonopoly Act, the Subcontract Act, and related laws and regulations, and always engage in fair and free competition. We will not engage in unfair transactions or acts, such as matching transaction conditions with other companies in the same industry or using our position in a transaction to impose unreasonable prices or transaction conditions on our partners."
    translated_ru: "Мы будем соблюдать Антимонопольный закон, Закон о субподряде и смежное законодательство и всегда вести честную и свободную конкуренцию. Запрещается участие в нечестных сделках, включая согласование условий с компаниями той же отрасли и навязывание необоснованных цен или условий партнёрам с использованием рыночной позиции."
    section_title: "8. Proper purchasing and partnership activities"
    relevance_comment: "Операциональные запреты: согласование условий с конкурентами, злоупотребление рыночной позицией."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P02_no_price_fixing"
      - "P03_no_market_allocation"
      - "P05_no_sensitive_info_exchange"
      - "P09_compete_fairly_no_disparagement"
