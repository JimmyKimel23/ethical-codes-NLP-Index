analyst_summary_ru: "Кодекс поведения Yamato Holdings содержит положения о конкуренции в двух местах: в преамбуле декларируется приверженность прибыльности через честную конкуренцию, а в разделе 8 прямо предписывается соблюдение Антимонопольного закона и Закона о субподряде. Особо запрещается согласование условий сделок с компаниями той же отрасли и навязывание необоснованных цен или условий партнёрам с использованием рыночной позиции."
