notes:
  - "Фрагмент о запрете жертвовать интересами компании при взаимодействии с контрагентами (включая конкурентов) является нормой о конфликте интересов, а не протоколом контактов с конкурентами; ложное присвоение P06 удалено."
  - "Приложение «Compliance Practical Examples» содержит дополнительные нормы, релевантные к конкурентным отношениям."
limitations:
  - "Антимонопольные нормы изложены кратко; отсутствуют детальные процедуры по контактам с конкурентами или обмену информацией."
analyst_summary_ru: "Кодекс поведения группы Suzuki содержит обязательство соблюдать антимонопольное законодательство и законы о добросовестной торговле с учётом региональных различий, а также проводить обучение сотрудников. Приложение «Compliance Practical Examples» запрещает незаконное получение коммерческих тайн третьих лиц. Предусмотрен механизм сообщения о нарушениях через руководство или специальную горячую линию. Детализированные правила взаимодействия с конкурентами в документе не представлены."
