key_excerpts:
  - original: "While Suzuki Group acknowledges the existence of difference in laws related to competition such as Antitrust Law and laws related to fare trading by each country or region, Suzuki Group will grasp the difference and carry out training on employees to observe laws and societal norms in their respective countries and regions."
    translated_ru: "Группа Suzuki признаёт различия в антимонопольном законодательстве и законах о добросовестной торговле в разных странах и регионах и обязуется изучать эти различия, а также проводить обучение сотрудников по соблюдению законов и общественных норм в соответствующих странах."
    section_title: "(6) Compliance"
    relevance_comment: "Обязательство соблюдать антимонопольное законодательство и проводить обучение сотрудников."
    supports_principles:
      - "P01_follow_competition_laws"
  - original: "Recognizing that obtaining trade secrets of any other persons without their consent constitutes an offence, you shall not do such a thing."
    translated_ru: "Осознавая, что получение коммерческих тайн третьих лиц без их согласия является правонарушением, вы не должны совершать подобных действий."
    section_title: "Compliance Practical Examples"
    relevance_comment: "Запрет на незаконное получение коммерческих тайн, включая тайны конкурентов."
    supports_principles:
      - "P08_respect_competitor_confidential_info"
  - original: "We will immediately consult with our supervisors when we notice any noncompliance or suspected noncompliance by another employee. In case we think it is improper to consult with our supervisors, we will report to the Consultation & Reporting Desk."
    translated_ru: "При обнаружении нарушения или подозрения на нарушение со стороны другого сотрудника мы немедленно обратимся к руководителю. Если обращение к руководителю представляется ненадлежащим, мы сообщим в службу консультаций и приёма сообщений."
    section_title: "(6) Compliance"
    relevance_comment: "Механизм эскалации и сообщения о нарушениях, применимый к антимонопольным нарушениям."
    supports_principles:
      - "P11_report_violations"
