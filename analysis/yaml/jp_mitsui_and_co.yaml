key_excerpts:
  - original: "We will comply with all laws and regulations concerning antitrust and fair competition in all countries and regions where we do business. We will always compete fairly and freely. We will verify applicable laws and regulations to avoid involvement in any illegal activities."
    translated_ru: "Мы будем соблюдать все законы и нормативные акты, касающиеся антимонопольного регулирования и честной конкуренции, во всех странах и регионах, где мы ведём бизнес. Мы всегда будем конкурировать честно и свободно. Мы будем проверять применимые законы и нормативные акты, чтобы избежать участия в любой незаконной деятельности."
    section_title: "07. Compliance with Antitrust and Competition Laws"
    relevance_comment: "Прямое обязательство соблюдать антимонопольное законодательство и конкурировать честно во всех юрисдикциях."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "We will not ignore concerns or problems that come to our attention, but will always raise them with our supervisor or the relevant division. We will promptly report any actions that might go against these conduct guidelines to the company and seek advice."
    translated_ru: "Мы не будем игнорировать проблемы или вопросы, ставшие нам известными, а всегда будем доводить их до сведения руководителя или соответствующего подразделения. Мы будем незамедлительно сообщать компании о любых действиях, которые могут противоречить данным руководящим принципам, и обращаться за консультацией."
    section_title: "18. Reporting"
    relevance_comment: "Механизм информирования о нарушениях, применимый в том числе к антимонопольным нарушениям."
    supports_principles:
      - "P11_report_violations"
