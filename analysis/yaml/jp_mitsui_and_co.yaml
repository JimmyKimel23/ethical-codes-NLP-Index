analyst_summary_ru: "Руководящие принципы поведения Mitsui & Co. Group в разделе 07 прямо обязывают соблюдать все антимонопольные законы и нормы честной конкуренции во всех странах присутствия, а также конкурировать честно и свободно. Компания требует проверять применимое законодательство для исключения участия в незаконной деятельности. Раздел 18 устанавливает обязанность информировать руководство о любых нарушениях руководящих принципов. Конкретные запреты на картельные сговоры, обмен конфиденциальной информацией с конкурентами или протоколы контактов с конкурентами в документе не детализированы."
