analyst_summary_ru: "Кодекс поведения MOL Group содержит прямое требование соблюдения антимонопольного законодательства Японии и зарубежных стран, а также ссылку на внутренние Правила поведения в сфере антимонопольного права для поддержания свободной и честной конкуренции. Документ также предусматривает обязанность сотрудников незамедлительно сообщать о нарушениях или подозрениях в нарушении комплаенс-требований через установленные каналы. Конкретные запреты на ценовой сговор или раздел рынков в тексте кодекса не детализированы."
