key_excerpts:
  - original: "Respect various laws and regulations in Japan, including antitrust laws and the Act against Delay in Payment of Subcontract Proceeds, Etc. to Subcontractors, as well as similar laws and regulations outside Japan, and observe the company's Rules of Conduct Related to Antitrust Laws in order to maintain and promote free and fair competition."
    translated_ru: "Соблюдать различные законы и нормативные акты Японии, включая антимонопольное законодательство и Закон о противодействии задержке выплат субподрядчикам, а также аналогичные законы за рубежом, и следовать корпоративным Правилам поведения в области антимонопольного законодательства в целях поддержания и содействия свободной и честной конкуренции."
    section_title: "(8) Build good relationships based on trust with clients and contractors"
    relevance_comment: "Прямое требование соблюдения антимонопольного законодательства Японии и зарубежных стран, а также внутренних правил компании по антимонопольному праву."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "Strive to build strong, trusting business relationships and partnerships with honesty, fairness and transparency."
    translated_ru: "Стремиться к построению прочных, доверительных деловых отношений и партнёрств на основе честности, справедливости и прозрачности."
    section_title: "(8) Build good relationships based on trust with clients and contractors"
    relevance_comment: "Принцип честной и прозрачной конкуренции в отношениях с партнёрами."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
  - original: "A company individual should report or consult with the Compliance Officer, Compliance Committee Officer, Internal Compliance Advisory Service Desk or External Compliance Advisory Service Desk without delay, if he or she learns of a breach or suspected breach of compliance."
    translated_ru: "Сотрудник компании обязан незамедлительно сообщить или обратиться за консультацией к Комплаенс-офицеру, члену Комплаенс-комитета, внутренней или внешней службе консультирования по вопросам соблюдения нормативных требований, если ему стало известно о нарушении или подозрении в нарушении комплаенс-требований."
    section_title: "(11) Report and consult on discovering suspected breaches"
    relevance_comment: "Обязанность сообщать о нарушениях, включая нарушения антимонопольного законодательства."
    supports_principles:
      - "P11_report_violations"
