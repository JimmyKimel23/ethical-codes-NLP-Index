notes:
  - "Удалён ложный P06 на фрагменте о конфликте интересов (перечисление клиентов, поставщиков, конкурентов в контексте COI)."
  - "Добавлены P02 и P03 — раздел Fair Competition прямо упоминает фиксацию цен и раздел рынков."
  - "Добавлен P11 на основе раздела Reporting Concerns."
limitations:
  - "Кодекс не содержит детальных правил о контактах с конкурентами, участии в торговых ассоциациях или протоколах сбора конкурентной информации."
analyst_summary_ru: "Глобальный кодекс деловой этики Otsuka Holdings содержит раздел «Fair Competition», в котором компания обязуется соблюдать антимонопольное законодательство и конкурировать на основе достоинств своих продуктов. Прямо перечислены запрещённые практики: фиксация цен, раздел рынков, распределение клиентов и ограничение производства. Раздел «Reporting Concerns» устанавливает обязанность сотрудников сообщать о нарушениях с гарантией защиты от преследования. Детальные положения о контроле контактов с конкурентами или обмене конфиденциальной информацией отсутствуют."
