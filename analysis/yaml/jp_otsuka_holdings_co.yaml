key_excerpts:
  - original: "We commit ourselves to fair and open competition on the merits of our products and services. Accordingly, we abide by antitrust laws, which promote healthy competition on a level playing field by preventing interference with a competitive market system."
    translated_ru: "Мы привержены честной и открытой конкуренции на основе достоинств наших продуктов и услуг. Соответственно, мы соблюдаем антимонопольное законодательство, которое обеспечивает здоровую конкуренцию на равных условиях, предотвращая вмешательство в конкурентную рыночную систему."
    section_title: "Fair Competition"
    relevance_comment: "Приверженность антимонопольному законодательству и добросовестной конкуренции."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "The laws aim to protect consumers and competitors against unfair practices such as agreements among competitors to fix prices, divide markets, allocate customers or limit the quality or production of products."
    translated_ru: "Законы направлены на защиту потребителей и конкурентов от недобросовестных практик, таких как соглашения между конкурентами о фиксации цен, разделе рынков, распределении клиентов или ограничении качества или объёмов производства."
    section_title: "Fair Competition"
    relevance_comment: "Прямое упоминание запрета ценового сговора, раздела рынков и распределения клиентов."
    supports_principles:
      - "P02_no_price_fixing"
      - "P03_no_market_allocation"
  - original: "We also urge you to report it immediately if you suspect or know of any violation of law, this Code, or internal Company policies and procedures. We will promptly investigate the matter and take corrective action if necessary. We prohibit retaliation of any kind."
    translated_ru: "Мы также настоятельно просим вас незамедлительно сообщать, если вы подозреваете или знаете о любом нарушении закона, данного Кодекса или внутренних политик и процедур компании. Мы оперативно расследуем дело и при необходимости примем корректирующие меры. Любые формы преследования запрещены."
    section_title: "Reporting Concerns"
    relevance_comment: "Обязанность сообщать о нарушениях с гарантией защиты от преследования."
    supports_principles:
      - "P11_report_violations"
