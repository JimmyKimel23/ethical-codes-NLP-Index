notes:
  - "Astellas содержит наиболее детальное описание конкурентных правил среди рассмотренных японских компаний."
  - "P06 обоснованно присвоен фрагменту об отраслевых встречах (industry meetings) — это именно протокол контактов с конкурентами."
limitations:
  - "Документ не содержит отдельного раздела о запрете раздела рынков или манипулирования торгами."
analyst_summary_ru: "Кодекс поведения Astellas Pharma содержит развёрнутый раздел о честной конкуренции, включающий обязательство соблюдать антимонопольное законодательство во всех странах присутствия, запрет на незаконный сбор информации о конкурентах, требование юридического одобрения любых соглашений с конкурентами по ценам или условиям продаж, а также протокол осторожного поведения на отраслевых встречах. Документ также запрещает недобросовестные сравнения с продукцией конкурентов и устанавливает механизм эскалации вопросов в юридический отдел."
