key_excerpts:
  - original: "We prioritize fair competition by adhering to competition laws in all operating countries. If you're ever uncertain about the right course of action to ensure fair competition, seek guidance from Legal."
    translated_ru: "Мы отдаём приоритет честной конкуренции, соблюдая законы о конкуренции во всех странах присутствия. При любых сомнениях относительно правильного порядка действий для обеспечения честной конкуренции следует обращаться за консультацией в юридический отдел."
    section_title: "We compete fairly"
    relevance_comment: "Обязательство соблюдать законодательство о конкуренции с эскалацией вопросов в юридический отдел."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P10_escalate_to_legal"
  - original: "We collect information about other companies lawfully and report any suspected unlawful collection to Legal. Agreements with competitors on pricing, sales terms, or marketing require Legal approval. Any discussions that could be perceived as agreements must be reported."
    translated_ru: "Мы собираем информацию о других компаниях законными методами и сообщаем о любых подозрениях в незаконном сборе информации в юридический отдел. Соглашения с конкурентами по вопросам ценообразования, условий продаж или маркетинга требуют одобрения юридического отдела. Любые обсуждения, которые могут быть восприняты как соглашения, должны быть зафиксированы."
    section_title: "We compete fairly"
    relevance_comment: "Правила законного сбора конкурентной информации, запрет на ценовые соглашения без одобрения юристов, обязательность отчётности."
    supports_principles:
      - "P02_no_price_fixing"
      - "P07_no_improper_competitor_intel"
      - "P05_no_sensitive_info_exchange"
      - "P11_report_violations"
  - original: "At industry meetings, we remain cautious of anti-competitive discussions and avoid arrangements with customers, suppliers, or distributors that unfairly exclude competitors or harm customers or patients. Legal consultation is necessary for contracts with restrictive provisions, such as exclusivity or non-compete clauses."
    translated_ru: "На отраслевых встречах мы проявляем осторожность в отношении антиконкурентных обсуждений и избегаем договорённостей с клиентами, поставщиками или дистрибьюторами, которые несправедливо исключают конкурентов или наносят вред клиентам или пациентам. Для контрактов с ограничительными положениями, такими как эксклюзивность или неконкуренция, необходима консультация юридического отдела."
    section_title: "We compete fairly"
    relevance_comment: "Протокол поведения на отраслевых встречах и контроль антиконкурентных обсуждений."
    supports_principles:
      - "P06_control_competitor_contacts"
      - "P09_compete_fairly_no_disparagement"
  - original: "We do not make unsubstantiated claims regarding our products or misleading comparisons with competitor products."
    translated_ru: "Мы не делаем необоснованных заявлений о нашей продукции и не проводим вводящих в заблуждение сравнений с продукцией конкурентов."
    section_title: "We promote and communicate ethically"
    relevance_comment: "Запрет на недобросовестные сравнения с конкурентами."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
