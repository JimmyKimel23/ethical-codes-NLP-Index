key_excerpts:
  - original: "It is governed by regulations instituted by various industry bodies, as well as by numerous other laws and regulations, such as foreign exchange acts, anti-trust laws, truth-in-advertising laws, subcontracting laws, and unfair competition laws. Given that our internal rules reflect the provisions of the above laws and regulations, abiding by them will ensure that the Group's operations are compliant with laws and regulations."
    translated_ru: "Группа регулируется нормативными актами различных отраслевых органов, а также многочисленными другими законами и правилами, включая законы о валютном регулировании, антимонопольное законодательство, законы о достоверности рекламы, законы о субподряде и законы о недобросовестной конкуренции. Учитывая, что внутренние правила Группы отражают положения указанных законов и нормативных актов, их соблюдение обеспечивает соответствие деятельности Группы требованиям законодательства."
    section_title: "Compliance with laws and regulations"
    relevance_comment: "Прямое упоминание антимонопольного законодательства и законов о недобросовестной конкуренции в числе обязательных к соблюдению."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
      - "P12_internal_controls_and_documentation"
  - original: "Please speak up without hesitation if you are encountering any difficulty in complying with our internal rules."
    translated_ru: "Пожалуйста, не стесняйтесь сообщать, если вы испытываете какие-либо затруднения с соблюдением наших внутренних правил."
    section_title: "Compliance with laws and regulations"
    relevance_comment: "Призыв к сотрудникам сообщать о трудностях с соблюдением правил, включая антимонопольные нормы."
    supports_principles:
      - "P11_report_violations"
