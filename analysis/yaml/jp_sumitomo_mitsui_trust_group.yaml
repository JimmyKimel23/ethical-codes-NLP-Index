analyst_summary_ru: "Кодекс поведения Sumitomo Mitsui Trust Group упоминает антимонопольное законодательство и законы о недобросовестной конкуренции в числе обязательных к соблюдению нормативных актов. Внутренние правила Группы построены на основе этих законов, что обеспечивает базовый уровень комплаенса. Документ также призывает сотрудников сообщать о трудностях с соблюдением внутренних правил. Однако детальные положения о взаимодействии с конкурентами или предотвращении антиконкурентных соглашений отсутствуют."
