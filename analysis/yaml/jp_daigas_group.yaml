key_excerpts:
  - original: "We conduct business activities in compliance with the Antimonopoly Act, the Act against Unjustifiable Premiums and Misleading Representations, and other relevant laws and regulations aimed at preventing monopolistic behavior. We refrain from engaging in anti-competitive, restrictive, and unfair trade practices."
    translated_ru: "Мы осуществляем деловую деятельность в соответствии с Законом о борьбе с монополиями, Законом о противодействии неоправданным премиям и вводящим в заблуждение представлениям, а также другими соответствующими законами и нормативными актами, направленными на предотвращение монополистического поведения. Мы воздерживаемся от антиконкурентных, ограничительных и недобросовестных торговых практик."
    section_title: "7. Complying with antimonopoly laws and regulations, and conducting fair transactions"
    relevance_comment: "Прямое обязательство соблюдать антимонопольное законодательство и воздерживаться от антиконкурентных практик."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "We pursue fair trading practices by complying with laws and regulations related to antimonopoly laws. We conduct business transactions in compliance with relevant laws and regulations, making fair judgment based on economic rationality."
    translated_ru: "Мы стремимся к добросовестным торговым практикам, соблюдая законодательство, связанное с антимонопольными законами. Мы проводим деловые операции в соответствии с применимым законодательством, принимая справедливые решения на основе экономической рациональности."
    section_title: "7. Complying with antimonopoly laws and regulations, and conducting fair transactions"
    relevance_comment: "Дополнительное обязательство по честной конкуренции и экономически обоснованному поведению."
    supports_principles:
      - "P01_follow_competition_laws"
