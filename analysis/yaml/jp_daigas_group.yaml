analyst_summary_ru: "Кодекс делового поведения Daigas Group в разделе 7 устанавливает обязательство соблюдать Закон о борьбе с монополиями и иные антимонопольные нормы. Компания прямо запрещает антиконкурентные, ограничительные и недобросовестные торговые практики. Также подчёркивается необходимость справедливых деловых операций на основе экономической рациональности. Специфические процедуры контактов с конкурентами или обмена информацией в документе не раскрыты."
