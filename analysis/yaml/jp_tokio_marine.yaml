key_excerpts:
  - original: "1-3 Free and Fair Competition. We shall conduct our business in compliance with antitrust, competition and free trade laws. We shall not undertake any action that hampers free and fair competition, including collusion and cartel formation. We shall abstain from any act falling under unfair trade practices."
    translated_ru: "Раздел 1-3 обязывает вести деятельность в соответствии с антимонопольными и торговыми нормами и прямо запрещает действия, подрывающие свободную и честную конкуренцию, включая сговор и создание картелей, а также иные недобросовестные торговые практики."
    section_title: "1-3 Free and Fair Competition"
    relevance_comment: "Прямо закреплены запреты collusion/cartel и требование соблюдения antitrust правил."
