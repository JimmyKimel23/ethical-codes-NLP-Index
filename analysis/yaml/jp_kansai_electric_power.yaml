key_excerpts:
  - original: "We practice fair and free competition and conduct reasonable business transactions. We do not participate in bribery or other corrupt conduct with the goal of obtaining profits unfairly."
    translated_ru: "Мы практикуем честную и свободную конкуренцию и проводим обоснованные деловые операции. Мы не участвуем во взяточничестве или иных коррупционных действиях с целью нечестного получения прибыли."
    section_title: "2. Fair business activities"
    relevance_comment: "Общее обязательство по честной и свободной конкуренции."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
  - original: "Comply with the Antimonopoly Act, the Electricity Business Act, and other laws and regulations regarding fair business activities, and make a clean break with rule violations."
    translated_ru: "Соблюдать Закон о борьбе с монополиями, Закон об электроэнергетике и другие законы и нормативные акты, касающиеся добросовестной деловой деятельности, и решительно пресекать нарушения правил."
    section_title: "2. Fair business activities — Conduct standards for individuals"
    relevance_comment: "Конкретное требование соблюдать антимонопольный закон и пресекать нарушения."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P11_report_violations"
  - original: "When you have doubts about something or feel it is strange, have courage and report to and consult with work superiors or a Compliance Hotline."
    translated_ru: "Если у вас есть сомнения или что-то кажется вам подозрительным, проявите смелость и сообщите об этом своему руководителю или обратитесь на горячую линию комплаенса."
    section_title: "1. Thorough compliance implementation"
    relevance_comment: "Механизм эскалации и информирования о подозрительных действиях через горячую линию комплаенса."
    supports_principles:
      - "P11_report_violations"
