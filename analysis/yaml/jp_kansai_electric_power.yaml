analyst_summary_ru: "Кодекс поведения Kansai Electric Power Group в разделе 2 устанавливает обязательство по честной и свободной конкуренции и прямо требует соблюдения Закона о борьбе с монополиями и Закона об электроэнергетике. Стандарты индивидуального поведения предписывают решительно пресекать нарушения правил. Раздел 1 предусматривает возможность обращения на горячую линию комплаенса при возникновении сомнений. Детальные положения о контактах с конкурентами или обмене чувствительной информацией в документе отсутствуют."
