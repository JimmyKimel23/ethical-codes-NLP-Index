key_excerpts:
  - original: "I will recognize the importance of fair and free competition in the market, and will not engage in any unjust restrictions on transactions, such as collusion and cartels, any unfair transactions, or any act that may be construed as doing any of the above."
    translated_ru: "Я осознаю важность честной и свободной конкуренции на рынке и не буду участвовать в каких-либо неправомерных ограничениях сделок, таких как сговор и картели, в нечестных сделках или в каких-либо действиях, которые могут быть истолкованы как вышеперечисленные."
    section_title: "Fair competition"
    relevance_comment: "Прямой запрет на сговор и картели, а также на любые нечестные ограничения сделок."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P02_no_price_fixing"
      - "P09_compete_fairly_no_disparagement"
  - original: "I will maintain a fair, equitable, and transparent relationship with stakeholders and will not perform any act of corruption, collusion, coercion or fraud, or any other misconduct."
    translated_ru: "Я буду поддерживать справедливые, равноправные и прозрачные отношения с заинтересованными сторонами и не буду совершать каких-либо коррупционных действий, вступать в сговор, прибегать к принуждению или мошенничеству, или к любым другим нарушениям."
    section_title: "Fair relationship with stakeholders"
    relevance_comment: "Общий запрет на сговор и коррупцию в отношениях с заинтересованными сторонами."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P02_no_price_fixing"
  - original: "In cases where I am uncertain about this Code of Conduct, in-house policies and guidelines, or applicable laws and regulations, or become aware of any act in violation thereof, I will not ignore it and will consult with my superiors or the relevant divisions to solve the issue."
    translated_ru: "В случаях, когда у меня возникают сомнения относительно данного Кодекса поведения, внутренних политик и руководств или применимых законов и нормативных актов, или если мне стало известно о каких-либо нарушениях, я не буду игнорировать это и обращусь к руководству или в соответствующие подразделения для решения проблемы."
    section_title: "Consultation and Report on Doubts and Concerns about Compliance"
    relevance_comment: "Механизм эскалации и информирования о нарушениях."
    supports_principles:
      - "P11_report_violations"
