analyst_summary_ru: "Кодекс поведения NEC Corporation содержит прямой запрет на сговор, картели и нечестные ограничения сделок, подчёркивая важность честной и свободной конкуренции. Документ также устанавливает общий принцип справедливых и прозрачных отношений с заинтересованными сторонами, запрещая коррупцию и сговор. Предусмотрен механизм консультаций и информирования о нарушениях через руководство или систему whistleblowing."
