key_excerpts:
  - original: "Compete honestly and transparently, following all antitrust, competition, and trade laws and regulations. Use fair and consistent metrics to evaluate employees and select third parties."
    translated_ru: "Конкурируйте честно и прозрачно, соблюдая все антимонопольные законы, законы о конкуренции и торговле. Используйте справедливые и последовательные критерии для оценки сотрудников и выбора третьих сторон."
    section_title: "Be Impartial and Fair"
    relevance_comment: "Прямое указание на соблюдение антимонопольного законодательства и законов о конкуренции."
    supports_principles:
      - "P01_follow_competition_laws"
  - original: "Never engage in any activities with competitors that could appear to harm fair competition. Do not work with any suppliers or other third parties that have not been properly reviewed and selected according to Nissan policies."
    translated_ru: "Никогда не участвуйте в каких-либо действиях с конкурентами, которые могут нанести ущерб добросовестной конкуренции. Не работайте с поставщиками или третьими сторонами, не прошедшими надлежащую проверку в соответствии с политиками Nissan."
    section_title: "Be Impartial and Fair"
    relevance_comment: "Запрет на действия с конкурентами, подрывающие добросовестную конкуренцию."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
  - original: "Employees who suspect that a violation of the Code has occurred are obligated to report it as soon as possible. Employees are encouraged to use the SpeakUp system to report their suspicions. Employees who act in good faith when reporting suspected violations will be protected from retaliation."
    translated_ru: "Сотрудники, подозревающие нарушение Кодекса, обязаны сообщить об этом как можно скорее. Для этого рекомендуется использовать систему SpeakUp. Сотрудники, добросовестно сообщающие о предполагаемых нарушениях, защищены от преследования."
    section_title: "Be Active and Report Violations (Speak Up)"
    relevance_comment: "Обязанность сообщать о нарушениях и защита информаторов — применимо к нарушениям антимонопольного законодательства."
    supports_principles:
      - "P11_report_violations"
