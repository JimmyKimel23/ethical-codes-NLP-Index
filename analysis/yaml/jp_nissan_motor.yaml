analyst_summary_ru: "Кодекс поведения Nissan Motor содержит общие требования о соблюдении антимонопольного законодательства и добросовестной конкуренции в разделе «Be Impartial and Fair». Прямо запрещены действия с конкурентами, способные нанести ущерб справедливой конкуренции. Документ также устанавливает обязанность сотрудников сообщать о нарушениях через систему SpeakUp с гарантией защиты от преследования. Детальные положения о ценовом сговоре, разделе рынков или контроле контактов с конкурентами отсутствуют."
