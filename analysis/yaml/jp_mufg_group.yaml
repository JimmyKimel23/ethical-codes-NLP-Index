key_excerpts:
  - original: "As a participant in a fair, transparent, and free competitive market, we must not have involvement with unfair trading practices (including cartels, abuse of dominant position, and market manipulation)."
    translated_ru: "Как участник честного, прозрачного и свободного конкурентного рынка, мы не должны участвовать в недобросовестных торговых практиках, включая картели, злоупотребление доминирующим положением и манипулирование рынком."
    section_title: "Ban on Unfair Trading Practices"
    relevance_comment: "Прямой запрет картелей, злоупотребления доминирующим положением и манипулирования рынком в выделенном подразделе."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P02_no_price_fixing"
      - "P03_no_market_allocation"
  - original: "We abide strictly with all the laws and rules (including all local tax and compliance requirements) in place to protect fair trading, including firewall regulations and the arm's length rule in the case of intercompany transactions between MUFG entities."
    translated_ru: "Мы строго соблюдаем все законы и правила, направленные на защиту честной торговли, включая правила информационных барьеров и принцип «вытянутой руки» при межгрупповых операциях."
    section_title: "Ban on Unfair Trading Practices"
    relevance_comment: "Обязательство соблюдения всех правил защиты честной торговли, включая внутренние процедуры контроля."
    supports_principles:
