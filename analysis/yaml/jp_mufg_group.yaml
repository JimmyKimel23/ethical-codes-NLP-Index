analyst_summary_ru: "Кодекс поведения MUFG Group содержит выделенный подраздел «Ban on Unfair Trading Practices» в главе об ответственности перед обществом. В нём прямо запрещается участие в картелях, злоупотребление доминирующим положением и манипулирование рынком. Группа обязывает сотрудников строго соблюдать все законы и правила, направленные на защиту честной торговли, включая правила информационных барьеров и принцип «вытянутой руки» при межгрупповых операциях. Качество доказательств высокое — положения чёткие и оформлены в виде отдельного подраздела."
