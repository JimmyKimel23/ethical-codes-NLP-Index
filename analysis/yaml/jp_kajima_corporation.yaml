analyst_summary_ru: "Кодекс поведения Kajima Corporation содержит отдельный именованный раздел «Fair, Transparent and Free Competition, and Appropriate Trade» в рамках главы I «Fair and Honest Corporate Conduct». В нём прямо запрещается получение контрактов незаконным путём, воспрепятствование честной конкуренции, а также демпинговые практики, наносящие ущерб отрасли, — с особым упоминанием тендеров на строительные работы. Дополнительно предусмотрены требования к прозрачным и справедливым отношениям с субподрядчиками."
