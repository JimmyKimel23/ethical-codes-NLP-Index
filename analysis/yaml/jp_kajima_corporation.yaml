key_excerpts:
  - original: "Fair, Transparent and Free Competition. Do not seek contract awards or profit through unlawful actions. In both domestic and international activities and in both public and private sectors, do not hinder fair, transparent, and free competition and appropriate transactions in any activity, particularly in the bidding and tendering for construction work."
    translated_ru: "Запрещается добиваться получения контрактов или прибыли незаконными способами. Как во внутренней, так и в международной деятельности, в государственном и частном секторе запрещается препятствовать честной, прозрачной и свободной конкуренции, в особенности при участии в тендерах на строительные работы."
    section_title: "Fair, Transparent and Free Competition, and Appropriate Trade"
    relevance_comment: "Именованный подраздел с прямым запретом на нечестные практики при тендерах и воспрепятствование конкуренции."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P04_no_bid_rigging"
      - "P09_compete_fairly_no_disparagement"
  - original: "Do not engage in 'dumping' practices that are detrimental to the industry. Healthy and Fair Relations with Subcontractors. Enter into transparent, fair, and reasonable contracts with subcontractors."
    translated_ru: "Запрещаются демпинговые практики, наносящие ущерб отрасли. Необходимо заключать прозрачные, справедливые и обоснованные контракты с субподрядчиками."
    section_title: "Fair, Transparent and Free Competition, and Appropriate Trade"
    relevance_comment: "Запрет демпинга и требование справедливых отношений с субподрядчиками."
    supports_principles:
      - "P09_compete_fairly_no_disparagement"
