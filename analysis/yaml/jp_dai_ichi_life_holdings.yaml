analyst_summary_ru: "Кодекс поведения группы Dai-ichi Life содержит краткое упоминание конкурентной тематики в разделе «Compliance with laws and regulations» (Foundational Conduct). Пункт (4) прямо запрещает участие в недобросовестных практиках, включая злоупотребление переговорной позицией, картели и манипулирование рынком. Однако положение сформулировано кратко — одной строкой в перечне из четырёх базовых принципов без дополнительной детализации. Качество доказательств оценивается как среднее: содержание релевантно, но объём и глубина минимальны."
