analyst_summary_ru: "Кодекс этики и делового поведения Hitachi содержит подробный раздел «Compete Fairly» с обширным перечнем антимонопольных требований. Прямо запрещены ценовой сговор, раздел рынков, фальсификация торгов и обмен конфиденциальной информацией с конкурентами. Установлены правила контактов с конкурентами, включая поведение на отраслевых мероприятиях, а также требования к добросовестному сбору конкурентной информации. Предусмотрена эскалация подозрительных ситуаций в юридический или комплаенс-отдел, а также система каналов для сообщений о нарушениях (speak-up channels)."
