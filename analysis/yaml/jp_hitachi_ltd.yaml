key_excerpts:
  - original: "We compete fairly and comply with competition laws in all countries in which we do business. We know that everyone benefits from a competitive marketplace, so we follow the anti-trust and fair competition laws in locations where we operate."
    translated_ru: "Мы конкурируем честно и соблюдаем законы о конкуренции во всех странах, где ведём бизнес. Мы понимаем, что конкурентный рынок выгоден всем, поэтому следуем антимонопольному законодательству и законам о добросовестной конкуренции в регионах присутствия."
    section_title: "Compete Fairly"
    relevance_comment: "Общее обязательство соблюдать антимонопольное законодательство и конкурировать добросовестно."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P09_compete_fairly_no_disparagement"
  - original: "Never enter into an oral or written agreement or understanding with a competitor to: Divide markets or customers. Fix prices. Manipulate a competitive bidding process. Exchange or discuss sensitive information such as prices, customers, discounts, market share, product development plans, capacity, sales territories, sales volumes, supply terms or strategic plans."
    translated_ru: "Никогда не заключайте устных или письменных соглашений с конкурентом о: разделе рынков или клиентов; фиксации цен; манипулировании конкурсными торгами; обмене или обсуждении конфиденциальной информации — цен, клиентов, скидок, доли рынка, планов разработки продуктов, мощностей, территорий продаж, объёмов продаж, условий поставок или стратегических планов."
    section_title: "Compete Fairly"
    relevance_comment: "Прямой запрет ценового сговора, раздела рынков, фальсификации торгов и обмена конфиденциальной информацией."
    supports_principles:
      - "P02_no_price_fixing"
      - "P03_no_market_allocation"
      - "P04_no_bid_rigging"
      - "P05_no_sensitive_info_exchange"
  - original: "Avoid contact with competitors that might raise a suspicion of improper or inappropriate conduct. Do not engage in inappropriate discussions or anti-competitive conduct while attending an industry association meeting or trade show. If you become aware of this behavior, distance yourself from it and notify a Compliance or Legal team member as soon as possible."
    translated_ru: "Избегайте контактов с конкурентами, которые могут вызвать подозрение в ненадлежащем поведении. Не участвуйте в неуместных обсуждениях или антиконкурентных действиях на заседаниях отраслевых ассоциаций или выставках. Если вы стали свидетелем такого поведения, дистанцируйтесь и незамедлительно уведомите отдел комплаенса или юридический отдел."
    section_title: "Compete Fairly"
    relevance_comment: "Контроль контактов с конкурентами, правила поведения на отраслевых мероприятиях и эскалация в юридический отдел."
    supports_principles:
      - "P06_control_competitor_contacts"
      - "P10_escalate_to_legal"
  - original: "If you gather information about our competitors, use honest methods. Do not encourage anyone to give you confidential information."
    translated_ru: "При сборе информации о конкурентах используйте честные методы. Не побуждайте кого-либо передавать вам конфиденциальную информацию."
    section_title: "Compete Fairly"
    relevance_comment: "Требование к добросовестному сбору конкурентной информации и уважению конфиденциальности конкурентов."
    supports_principles:
      - "P07_no_improper_competitor_intel"
      - "P08_respect_competitor_confidential_info"
  - original: "Hitachi offers a variety of speak-up channels for more help and to report concerns. If you become aware of any conduct that may violate our Code, policies and protocols, or laws and regulations, please speak up through the available channels."
    translated_ru: "Hitachi предлагает различные каналы для обращений и сообщений о нарушениях. Если вам стало известно о поведении, которое может нарушать Кодекс, политики, процедуры или законодательство, воспользуйтесь доступными каналами для подачи сообщения."
    section_title: "Speak-up Channels"
    relevance_comment: "Механизм информирования о нарушениях, включая антимонопольные."
    supports_principles:
      - "P11_report_violations"
