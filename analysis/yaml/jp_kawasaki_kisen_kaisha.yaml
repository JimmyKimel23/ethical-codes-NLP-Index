analyst_summary_ru: "Руководство по реализации Хартии поведения Kawasaki Kisen Kaisha содержит обязательство соблюдать антимонопольное законодательство во всех юрисдикциях присутствия. Компания явно запрещает заключение антиконкурентных соглашений и злоупотребление доминирующим положением. Предусмотрена система внутренней отчётности для мониторинга соблюдения комплаенс-требований. Конкурентные нормы сформулированы на уровне деклараций без детальных процедур взаимодействия с конкурентами."
