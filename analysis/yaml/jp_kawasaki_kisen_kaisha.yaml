key_excerpts:
  - original: "\"K\" LINE promises to comply with laws and ordinances in each country and region where it operates, such as competition laws, anti-corruption / bribery laws, intellectual property laws, laws and regulations regarding insider trading and laws and regulations regarding security trade control policies, as well as the conventions and rules of the international community related to these matters, and the values of society, including ethical and moral standards."
    translated_ru: "«K» LINE обязуется соблюдать законы и нормативные акты каждой страны и региона присутствия, включая антимонопольное законодательство, законы о противодействии коррупции и взяточничеству, законы об интеллектуальной собственности, нормы об инсайдерской торговле и экспортном контроле, а также международные конвенции и этические стандарты общества."
    section_title: "2. Compliance with laws, regulations and other social norms"
    relevance_comment: "Обязательство соблюдать антимонопольное законодательство во всех юрисдикциях."
    supports_principles:
      - "P01_follow_competition_laws"
  - original: "\"K\" LINE recognizes that the regulations on fair competition in each country in which it operates are the basic rules for fair, transparent and free competition, and it promises to neither enter into any agreement in breach of these regulations nor abuse its dominant position."
    translated_ru: "«K» LINE признаёт, что нормы о добросовестной конкуренции в каждой стране являются базовыми правилами честной, прозрачной и свободной конкуренции, и обязуется не заключать соглашений, нарушающих эти нормы, а также не злоупотреблять своим доминирующим положением."
    section_title: "2. Compliance with laws, regulations and other social norms"
    relevance_comment: "Прямой запрет на антиконкурентные соглашения и злоупотребление доминирующим положением."
    supports_principles:
      - "P01_follow_competition_laws"
      - "P02_no_price_fixing"
      - "P09_compete_fairly_no_disparagement"
  - original: "\"K\" LINE will establish an internal reporting system and necessary measures for continually monitoring its compliance status and it will respond to any problem that may arise in a timely and effective manner."
    translated_ru: "«K» LINE создаст систему внутренней отчётности и необходимые механизмы для постоянного мониторинга состояния комплаенса и будет оперативно и эффективно реагировать на любые возникающие проблемы."
    section_title: "2. Compliance with laws, regulations and other social norms"
    relevance_comment: "Система внутренней отчётности, применимая к нарушениям антимонопольного законодательства."
    supports_principles:
      - "P11_report_violations"
      - "P12_internal_controls_and_documentation"
